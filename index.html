<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcflow | Intelligence Three Steps Ahead</title>
    <style>
        :root {
            --color-primary: #0a0e27;
            --color-secondary: #1a1f3a;
            --color-accent: #00d9ff;
            --color-bg: #050810;
            --color-text: #e8eef5;
            --color-surface: color-mix(in srgb, #050810 85%, #0a0e27 15%);
            --color-border: color-mix(in srgb, #e8eef5 15%, transparent 85%);
            --color-muted: color-mix(in srgb, #e8eef5 55%, transparent 45%);
            --font-headline: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --radius: 0.75rem;
            --radius-lg: 1.5rem;
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.65;
            font-size: 1rem;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 0%, color-mix(in srgb, var(--color-primary) 15%, transparent) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 100%, color-mix(in srgb, var(--color-secondary) 12%, transparent) 0%, transparent 65%);
            background-attachment: fixed;
            background-position: center;
        }

        /* Animation keyframes */
        @keyframes fadeInUp {
            from {
                opacity: 1;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 1;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Header / Sticky Nav */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: color-mix(in srgb, var(--color-bg) 80%, transparent);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--color-border);
            transition: background var(--transition), border-color var(--transition);
        }

        header.scrolled {
            background: color-mix(in srgb, var(--color-bg) 90%, transparent);
            border-bottom: 1px solid var(--color-border);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem clamp(1rem, 5vw, 2.5rem);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            font-family: var(--font-headline);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--color-text);
        }

        .logo-accent {
            color: var(--color-accent);
        }

        nav {
            display: none;
            flex: 1;
            gap: 3rem;
        }

        nav.visible {
            display: flex;
        }

        nav a {
            text-decoration: none;
            color: var(--color-text);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color var(--transition);
        }

        nav a:hover {
            color: var(--color-accent);
        }

        nav a:focus {
            outline: 2px solid var(--color-accent);
            outline-offset: 3px;
            border-radius: 4px;
        }

        .nav-cta {
            background: var(--color-accent);
            color: var(--color-primary);
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            transition: all var(--transition);
            box-shadow: 0 0 40px color-mix(in srgb, var(--color-accent) 20%, transparent);
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px color-mix(in srgb, var(--color-accent) 30%, transparent);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 101;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--color-text);
            border-radius: 2px;
            transition: all var(--transition);
        }

        body.nav-open .hamburger span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        body.nav-open .hamburger span:nth-child(2) {
            opacity: 1;
        }

        body.nav-open .hamburger span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Mobile nav drawer */
        .nav-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100vh;
            background: color-mix(in srgb, var(--color-bg) 95%, transparent);
            backdrop-filter: blur(20px);
            padding: 5rem 2rem 2rem;
            z-index: 99;
            display: none;
            flex-direction: column;
            gap: 2rem;
        }

        body.nav-open .nav-drawer {
            display: flex;
        }

        .nav-drawer a {
            text-decoration: none;
            color: var(--color-text);
            font-size: 1.1rem;
            font-weight: 500;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--color-border);
        }

        /* Responsive nav for mobile */
        @media (max-width: 768px) {
            nav {
                display: none !important;
            }

            .hamburger {
                display: flex;
            }
        }

        @media (min-width: 769px) {
            nav {
                display: flex !important;
            }

            .hamburger {
                display: none;
            }

            .nav-drawer {
                display: none !important;
            }
        }

        /* Main content */
        main {
            min-height: calc(100vh - 80px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-inline: clamp(1rem, 5vw, 2.5rem);
        }

        /* Hero section */
        .hero {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: clamp(3rem, 10vw, 6rem) clamp(1rem, 5vw, 2.5rem);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, color-mix(in srgb, var(--color-accent) 8%, transparent) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .hero-content {
            max-width: 900px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .hero-badge {
            display: inline-block;
            background: color-mix(in srgb, var(--color-primary) 70%, transparent);
            border: 1px solid var(--color-border);
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-accent);
            margin-bottom: 2rem;
            animation: fadeInUp 0.5s ease-out both;
        }

        .hero h1 {
            font-family: var(--font-headline);
            font-size: clamp(2.75rem, 6vw, 5rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            color: var(--color-text);
            animation: fadeInUp 0.5s ease-out 0.1s both;
        }

        .hero p {
            font-size: clamp(1.05rem, 2vw, 1.3rem);
            color: var(--color-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.5s ease-out 0.2s both;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            animation: fadeInUp 0.5s ease-out 0.3s both;
        }

        .btn {
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: var(--color-accent);
            color: var(--color-primary);
            box-shadow: 0 0 40px color-mix(in srgb, var(--color-accent) 20%, transparent);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px color-mix(in srgb, var(--color-accent) 30%, transparent);
        }

        .btn-primary:focus {
            outline: 2px solid var(--color-accent);
            outline-offset: 3px;
        }

        .btn-ghost {
            background: transparent;
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn-ghost:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background: color-mix(in srgb, var(--color-accent) 5%, transparent);
        }

        .btn-ghost:focus {
            outline: 2px solid var(--color-accent);
            outline-offset: 3px;
        }

        /* Social proof strip */
        .social-proof {
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
            padding: clamp(2rem, 5vw, 3rem) clamp(1rem, 5vw, 2.5rem);
        }

        .social-proof-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .social-proof-stat {
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            color: var(--color-muted);
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
        }

        .social-proof-logos {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(1.5rem, 4vw, 3rem);
            justify-content: center;
            align-items: center;
        }

        .logo-badge {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--color-text);
            padding: 0.5rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            white-space: nowrap;
            transition: all var(--transition);
        }

        .logo-badge:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        /* Problem Solution section */
        .problem-solution {
            padding: clamp(5rem, 10vw, 9rem) clamp(1rem, 5vw, 2.5rem);
            background: linear-gradient(135deg, color-mix(in srgb, var(--color-primary) 8%, transparent) 0%, transparent 100%);
        }

        .problem-solution-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .problem-solution-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
        }

        @media (min-width: 768px) {
            .problem-solution-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .ps-card {
            background: color-mix(in srgb, var(--color-bg) 70%, transparent);
            backdrop-filter: blur(12px);
            border: 1px solid var(--color-border);
            padding: clamp(2rem, 5vw, 2.5rem);
            border-radius: var(--radius-lg);
            transition: all var(--transition);
        }

        .ps-card:hover {
            border-color: var(--color-accent);
            background: color-mix(in srgb, var(--color-bg) 75%, transparent);
        }

        .ps-card h3 {
            font-family: var(--font-headline);
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: var(--color-text);
        }

        .ps-card ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .ps-card li {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .ps-card li::before {
            content: '→';
            color: var(--color-accent);
            font-weight: 800;
            flex-shrink: 0;
            font-size: 1.25rem;
        }

        .ps-card li span {
            color: var(--color-muted);
            line-height: 1.6;
        }

        /* Features grid */
        .features {
            padding: clamp(5rem, 10vw, 9rem) clamp(1rem, 5vw, 2.5rem);
        }

        .section-heading {
            font-family: var(--font-headline);
            font-size: clamp(2rem, 5vw, 2.5rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 3rem;
            text-align: center;
            color: var(--color-text);
        }

        .features-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: color-mix(in srgb, var(--color-bg) 70%, transparent);
            backdrop-filter: blur(12px);
            border: 1px solid var(--color-border);
            padding: 2rem;
            border-radius: var(--radius-lg);
            transition: all var(--transition);
        }

        .feature-card:hover {
            transform: translateY(-4px);
            border-color: var(--color-accent);
            box-shadow: 0 12px 40px color-mix(in srgb, var(--color-accent) 15%, transparent);
            background: color-mix(in srgb, var(--color-bg) 75%, transparent);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 1.5rem;
            opacity: 1;
        }

        .feature-card h4 {
            font-family: var(--font-headline);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--color-text);
        }

        .feature-card p {
            color: var(--color-muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Metrics band */
        .metrics {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            box-shadow: 0 0 60px color-mix(in srgb, var(--color-accent) 15%, transparent);
            padding: clamp(4rem, 8vw, 6rem) clamp(1rem, 5vw, 2.5rem);
        }

        .metrics-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            text-align: center;
        }

        .metric-item {
            animation: fadeInUp 0.5s ease-out both;
        }

        .metric-value {
            font-family: var(--font-headline);
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            color: var(--color-accent);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .metric-label {
            font-size: 0.95rem;
            color: var(--color-muted);
            font-weight: 500;
        }

        /* How it works */
        .how-it-works {
            padding: clamp(5rem, 10vw, 9rem) clamp(1rem, 5vw, 2.5rem);
            background: linear-gradient(135deg, color-mix(in srgb, var(--color-secondary) 8%, transparent) 0%, transparent 100%);
        }

        .how-it-works-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .steps-container {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .step {
            display: grid;
            grid-template-columns: 60px 1fr;
            gap: 2rem;
            animation: fadeInUp 0.5s ease-out both;
        }

        @media (min-width: 768px) {
            .step:nth-child(even) {
                grid-template-columns: 1fr 60px;
                direction: rtl;
            }

            .step:nth-child(even) > * {
                direction: ltr;
            }
        }

        .step-number {
            width: 60px;
            height: 60px;
            background: var(--color-primary);
            border: 2px solid var(--color-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-headline);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--color-accent);
            flex-shrink: 0;
        }

        .step-content h3 {
            font-family: var(--font-headline);
            font-size: clamp(1.25rem, 3vw, 1.5rem);
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--color-text);
        }

        .step-content p {
            color: var(--color-muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Testimonials */
        .testimonials {
            padding: clamp(5rem, 10vw, 9rem) clamp(1rem, 5vw, 2.5rem);
        }

        .testimonials-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .testimonial-card {
            background: color-mix(in srgb, var(--color-bg) 70%, transparent);
            backdrop-filter: blur(12px);
            border: 1px solid var(--color-border);
            padding: 2rem;
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: all var(--transition);
        }

        .testimonial-card:hover {
            border-color: var(--color-accent);
            background: color-mix(in srgb, var(--color-bg) 75%, transparent);
        }

        .quote-mark {
            font-size: 3rem;
            color: var(--color-accent);
            opacity: 1.6;
            line-height: 1;
        }

        .testimonial-text {
            font-size: 1rem;
            color: var(--color-text);
            line-height: 1.7;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
        }

        .author-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--color-primary);
            border: 2px solid var(--color-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--color-accent);
            flex-shrink: 0;
        }

        .author-info h4 {
            font-family: var(--font-headline);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--color-text);
            margin: 0;
        }

        .author-info p {
            font-size: 0.8rem;
            color: var(--color-muted);
            margin: 0;
        }

        /* Final CTA section */
        .final-cta {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            box-shadow: 0 0 60px color-mix(in srgb, var(--color-accent) 15%, transparent);
            padding: clamp(5rem, 10vw, 8rem) clamp(1rem, 5vw, 2.5rem);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .final-cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse 100% 80% at 50% 50%, color-mix(in srgb, var(--color-accent) 8%, transparent) 0%, transparent 70%);
            pointer-events: none;
        }

        .final-cta-content {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .final-cta h2 {
            font-family: var(--font-headline);
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            color: var(--color-text);
        }

        .final-cta p {
            font-size: clamp(1rem, 2vw, 1.1rem);
            color: var(--color-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Footer */
        footer {
            background: var(--color-primary);
            border-top: 1px solid var(--color-border);
            padding: clamp(3rem, 8vw, 4rem) clamp(1rem, 5vw, 2.5rem);
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .footer-column h3 {
            font-family: var(--font-headline);
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-column a {
            display: block;
            text-decoration: none;
            color: var(--color-muted);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            transition: color var(--transition);
        }

        .footer-column a:hover {
            color: var(--color-accent);
        }

        .footer-bottom {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--color-border);
        }

        .footer-copyright {
            font-size: 0.85rem;
            color: var(--color-muted);
        }

        .social-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .social-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--color-border);
            border-radius: 50%;
            transition: all var(--transition);
            cursor: pointer;
        }

        .social-icon:hover {
            border-color: var(--color-accent);
            background: color-mix(in srgb, var(--color-accent) 10%, transparent);
        }

        .social-icon svg {
            width: 16px;
            height: 16px;
            stroke: var(--color-text);
            fill: none;
            stroke-width: 2;
        }

        /* Utility classes for animations */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
        .delay-6 { animation-delay: 0.6s; }

        @media (max-width: 768px) {
            .footer-content {
                grid-template-columns: 1fr;
            }

            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header / Navigation -->
    <header>
        <div class="header-container">
