<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcflow | Intelligence Three Steps Ahead</title>
  <style>
    :root {
      --color-primary: #0a0e27;
      --color-secondary: #1a1f3a;
      --color-accent: #00d9ff;
      --color-bg: #050810;
      --color-text: #e8eef5;
      --color-surface: color-mix(in srgb, #050810 85%, #0a0e27 15%);
      --color-border: color-mix(in srgb, #e8eef5 15%, transparent 85%);
      --color-muted: color-mix(in srgb, #e8eef5 55%, transparent 45%);
      --font-headline: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --radius: 0.75rem;
      --radius-lg: 1.5rem;
      --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.65;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-headline);
      font-weight: 800;
      line-height: 1.15;
    }

    a {
      color: var(--color-accent);
      text-decoration: none;
      transition: color var(--transition);
    }

    a:hover {
      color: color-mix(in srgb, var(--color-accent) 80%, white);
    }

    button {
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
    }

    button:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
    }

    .btn-primary {
      background-color: var(--color-accent);
      color: var(--color-primary);
      box-shadow: 0 0 40px color-mix(in srgb, var(--color-accent) 20%, transparent);
    }

    .btn-primary:hover {
      background-color: color-mix(in srgb, var(--color-accent) 90%, white);
      box-shadow: 0 0 50px color-mix(in srgb, var(--color-accent) 30%, transparent);
    }

    .btn-ghost {
      background-color: transparent;
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    .btn-ghost:hover {
      background-color: color-mix(in srgb, var(--color-accent) 10%, transparent);
      border-color: var(--color-accent);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding-inline: clamp(1rem, 5vw, 2.5rem);
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100%);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.5s ease-out both;
    }

    .fade-in-up-1 { animation-delay: 0s; }
    .fade-in-up-2 { animation-delay: 0.1s; }
    .fade-in-up-3 { animation-delay: 0.2s; }
    .fade-in-up-4 { animation-delay: 0.3s; }
    .fade-in-up-5 { animation-delay: 0.4s; }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--color-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border);
      transition: background-color var(--transition);
    }

    header.scrolled {
      background-color: color-mix(in srgb, var(--color-bg) 80%, transparent);
      box-shadow: 0 10px 40px color-mix(in srgb, var(--color-bg) 50%, transparent);
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
    }

    .logo {
      font-family: var(--font-headline);
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-accent {
      color: var(--color-accent);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 3rem;
    }

    nav a {
      font-size: 0.95rem;
      color: var(--color-muted);
      font-weight: 500;
      transition: color var(--transition);
    }

    nav a:hover {
      color: var(--color-accent);
    }

    .nav-cta {
      margin-left: 1rem;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .hamburger span {
      width: 24px;
      height: 2px;
      background-color: var(--color-text);
      border-radius: 2px;
      transition: all var(--transition);
    }

    body.nav-open .hamburger span:nth-child(1) {
      transform: rotate(45deg) translateY(10px);
    }

    body.nav-open .hamburger span:nth-child(2) {
      opacity: 0;
    }

    body.nav-open .hamburger span:nth-child(3) {
      transform: rotate(-45deg) translateY(-10px);
    }

    .nav-drawer {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100vh;
      background-color: var(--color-bg);
      z-index: 99;
      flex-direction: column;
      padding: 6rem 2rem 2rem;
      gap: 2rem;
      animation: slideInRight 0.3s ease-out;
    }

    body.nav-open .nav-drawer {
      display: flex;
    }

    .nav-drawer a {
      font-size: 1.2rem;
      color: var(--color-muted);
    }

    .nav-drawer .btn-primary {
      width: fit-content;
      margin-top: 1rem;
    }

    @media (max-width: 768px) {
      nav {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }

    /* ─── HERO ─── */
    .hero {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: clamp(3rem, 10vw, 6rem) 0;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, color-mix(in srgb, var(--color-accent) 8%, transparent) 0%, transparent 70%),
        radial-gradient(ellipse 100% 60% at 80% 100%, color-mix(in srgb, var(--color-primary) 10%, transparent) 0%, transparent 70%);
      z-index: -1;
    }

    .hero-content {
      max-width: 900px;
      text-align: center;
    }

    .hero-badge {
      display: inline-block;
      background-color: color-mix(in srgb, var(--color-accent) 10%, transparent);
      color: var(--color-accent);
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      border: 1px solid var(--color-border);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: clamp(2.75rem, 6vw, 5rem);
      margin-bottom: 1.5rem;
    }

    .hero-subheadline {
      font-size: clamp(1.05rem, 2vw, 1.3rem);
      color: var(--color-muted);
      margin-bottom: 2.5rem;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-cta {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      justify-content: center;
      align-items: center;
    }

    @media (min-width: 640px) {
      .hero-cta {
        flex-direction: row;
      }
    }

    /* ─── SOCIAL PROOF STRIP ─── */
    .social-proof {
      background-color: var(--color-surface);
      border-top: 1px solid var(--color-border);
      border-bottom: 1px solid var(--color-border);
      padding: clamp(2rem, 5vw, 3rem) 0;
    }

    .social-proof-content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      align-items: center;
    }

    @media (min-width: 768px) {
      .social-proof-content {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
    }

    .proof-stat {
      flex: 0 0 auto;
      font-size: 0.95rem;
      color: var(--color-muted);
      max-width: 300px;
    }

    .proof-logos {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
    }

    .proof-logo {
      font-size: 0.9rem;
      color: var(--color-text);
      font-weight: 600;
      padding: 0.5rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background-color: color-mix(in srgb, var(--color-primary) 30%, transparent);
    }

    /* ─── PROBLEM & SOLUTION ─── */
    .problem-solution {
      padding: clamp(5rem, 10vw, 9rem) 0;
    }

    .ps-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 3rem;
    }

    @media (min-width: 968px) {
      .ps-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .ps-card {
      background-color: color-mix(in srgb, var(--color-surface) 70%, transparent);
      backdrop-filter: blur(12px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: clamp(2rem, 5vw, 3rem);
    }

    .ps-card h3 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      margin-bottom: 1.5rem;
    }

    .ps-bullets {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .ps-bullet {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .ps-bullet::before {
      content: '→';
      color: var(--color-accent);
      font-weight: bold;
      flex-shrink: 0;
      margin-top: 0.15rem;
    }

    .ps-bullet-text {
      color: var(--color-muted);
      font-size: 0.95rem;
    }

    /* ─── FEATURES GRID ─── */
    .features {
      padding: clamp(5rem, 10vw, 9rem) 0;
    }

    .features-heading {
      text-align: center;
      margin-bottom: clamp(3rem, 8vw, 5rem);
    }

    .features-heading h2 {
      font-size: clamp(2rem, 4vw, 2.75rem);
      margin-bottom: 1rem;
    }

    .features-heading p {
      color: var(--color-muted);
      font-size: 1.05rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }

    .feature-card {
      background-color: color-mix(in srgb, var(--color-surface) 70%, transparent);
      backdrop-filter: blur(12px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: clamp(2rem, 5vw, 2.5rem);
      transition: all var(--transition);
    }

    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px color-mix(in srgb, var(--color-accent) 15%, transparent);
      border-color: color-mix(in srgb, var(--color-accent) 30%, var(--color-border));
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      background-color: color-mix(in srgb, var(--color-accent) 10%, transparent);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      color: var(--color-accent);
    }

    .feature-icon svg {
      width: 24px;
      height: 24px;
    }

    .feature-card h3 {
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .feature-card p {
      color: var(--color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ─── METRICS ─── */
    .metrics {
      background:
        linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%),
        radial-gradient(ellipse 100% 80% at 50% 0%, color-mix(in srgb, var(--color-accent) 10%, transparent) 0%, transparent 80%);
      padding: clamp(5rem, 10vw, 9rem) 0;
      position: relative;
      overflow: hidden;
    }

    .metrics::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 100%, color-mix(in srgb, var(--color-accent) 5%, transparent) 0%, transparent 70%);
      z-index: 0;
    }

    .metrics-content {
      position: relative;
      z-index: 1;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: clamp(2rem, 5vw, 4rem);
      text-align: center;
    }

    .metric {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .metric-value {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 900;
      color: var(--color-accent);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .metric-label {
      color: var(--color-muted);
      font-size: 0.95rem;
      max-width: 200px;
    }

    /* ─── HOW IT WORKS ─── */
    .how-it-works {
      padding: clamp(5rem, 10vw, 9rem) 0;
    }

    .hiw-heading {
      text-align: center;
      margin-bottom: clamp(3rem, 8vw, 5rem);
    }

    .hiw-heading h2 {
      font-size: clamp(2rem, 4vw, 2.75rem);
    }

    .hiw-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 3rem;
    }

    @media (min-width: 968px) {
      .hiw-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .hiw-step {
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 968px) {
      .hiw-step:nth-child(even) {
        margin-top: 3rem;
      }
    }

    .hiw-step-number {
      width: 60px;
      height: 60px;
      background-color: var(--color-accent);
      color: var(--color-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 900;
      margin-bottom: 1.5rem;
      flex-shrink: 0;
    }

    .hiw-step h3 {
      font-size: clamp(1.35rem, 3vw, 1.75rem);
      margin-bottom: 1rem;
    }

    .hiw-step p {
      color: var(--color-muted);
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 500px;
    }

    /* ─── TESTIMONIALS ─── */
    .testimonials {
      padding: clamp(5rem, 10vw, 9rem) 0;
      background-color: var(--color-surface);
    }

    .testimonials-heading {
      text-align: center;
      margin-bottom: clamp(3rem, 8vw, 5rem);
    }

    .testimonials-heading h2 {
      font-size: clamp(2rem, 4vw, 2.75rem);
    }

    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    .testimonial-card {
      background-color: color-mix(in srgb, var(--color-bg) 70%, transparent);
      backdrop-filter: blur(12px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: clamp(2rem, 5vw, 2.5rem);
    }

    .testimonial-quote {
      font-size: 3rem;
      color: var(--color-accent);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .testimonial-text {
      font-size: 0.95rem;
      color: var(--color-text);
      line-height: 1.7;
      margin-bottom: 1.5rem;
      font-style: italic;
    }

    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .testimonial-avatar {
      width: 48px;
      height: 48px;
      background-color: color-mix(in srgb, var(--color-accent) 20%, transparent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-accent);
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .testimonial-info h4 {
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
    }

    .testimonial-info p {
      font-size: 0.8rem;
      color: var(--color-muted);
    }

    /* ─── FINAL CTA ─── */
    .final-cta {
      background:
        linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%),
        radial-gradient(ellipse 100% 80% at 50% 0%, color-mix(in srgb, var(--color-accent) 12%, transparent) 0%, transparent 80%);
      padding: clamp(5rem, 10vw, 9rem) 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .final-cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 100%, color-mix(in srgb, var(--color-accent) 8%, transparent) 0%, transparent 70%);
      z-index: 0;
    }

    .final-cta-content {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
    }

    .final-cta h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 1rem;
    }

    .final-cta-subtext {
      color: var(--color-muted);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    /* ─── FOOTER ─── */
    footer {
      background-color: var(--color-surface);
      border-top: 1px solid var(--color-border);
      padding: clamp(3rem, 8vw, 5rem) 0 2rem;
    }

    .footer-content {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .footer-section h4 {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      color: var(--color-text);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .footer-section ul {
      list-style: none;
    }

    .footer-section li {
      margin-bottom: 0.75rem;
    }

    .footer-section a {
      color: var(--color-muted);
      font-size: 0.9rem;
    }

    .footer-bottom {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--color-border);
      padding-top: 2rem;
    }

    @media (min-width: 640px) {
      .footer-bottom {
        flex-direction: row;
      }
    }

    .footer-copyright {
      color: var(--color-muted);
      font-size: 0.85rem;
    }

    .footer-socials {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
    }

    .footer-social-link {
      width: 40px;
      height: 40px;
      background-color: color-mix(in srgb, var(--color-accent) 10%, transparent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .footer-social-link:hover {
      background-color: var(--color-accent);
      color: var(--color-primary);
    }

    .footer-social-link svg {
      width: 20px;
      height: 20px;
    }

    /* ─── PAGE SECTIONS ─── */
    .page-section {
      display: none;
    }

    .page-section.active {
      display: block;
    }

    /* ─── HOW IT WORKS PAGE ─── */
    .hiw-page-hero {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(3rem, 10vw, 6rem) 0;
    }

    .hiw-page-hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      text-align: center;
    }

    .hiw-detailed-section {
      padding: clamp(5rem, 10vw, 9rem) 0;
    }

    .hiw-detailed-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4rem;
    }

    @media (min-width: 968px) {
      .hiw-detailed-grid {
        grid-template-columns: 1fr 1fr;
        align-items: center;
      }
    }

    .hiw-detailed-content h3 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      margin-bottom: 1.5rem;
    }

    .hiw-detailed-content p {
      color: var(--color-muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .hiw-illustration {
      background-color: color-mix(in srgb, var(--color-surface) 70%, transparent);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: clamp(2rem, 5vw, 4rem);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
    }

    /* ─── PLATFORM PAGE ─── */
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      padding: clamp(5rem, 10vw, 9rem) 0;
    }

    .platform-feature {
      background-color: color-mix(in srgb, var(--color-surface) 70%, transparent);
      backdrop-filter: blur(12px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: clamp(2rem, 5vw, 2.5rem);
    }

    .platform-feature h3 {
      font-size: 1.35rem;
      margin-bottom: 1rem;
    }

    .platform-feature p {
      color: var(--color-muted);
      font-size: 0.95rem;
    }

    /* ─── EARLY ACCESS PAGE ─── */
    .early-access-container {
      max-width: 600px;
      margin: 0 auto;
      padding: clamp(3rem, 10vw, 6rem) 0;
    }

    .early-access-heading {
      text-align: center;
      margin-bottom: 3rem;
    }

    .early-access-heading h1 {
      font-size: clamp(2rem, 4vw, 2.75rem);
      margin-bottom: 1rem;
    }

    .early-access-heading p {
      color: var(--color-muted);
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--color-text);
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 0.875rem;
      background-color: color-mix(in srgb, var(--color-surface) 70%, transparent);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: all var(--transition);
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 20px color-mix(in srgb, var(--color-accent) 20%, transparent);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-submit {
      width: 100%;
    }
